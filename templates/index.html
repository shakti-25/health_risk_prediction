<!DOCTYPE html>
<html>
<head>
    <title>Healthcare Risk Prediction</title>
</head>

<body>

<h2>Healthcare Risk Stratification</h2>

<form method="POST">

    <label>Age</label><br>
    <input type="number" name="age" required><br><br>

    <label>Length of Stay</label><br>
    <input type="number" name="length" required><br><br>

    <label>Treatment Cost</label><br>
    <input type="number" step="0.01" name="cost" required><br><br>

    <label>Abnormal Lab Count</label><br>
    <input type="number" name="abnormal" min="0" required><br><br>

    <button type="submit">Predict</button>

</form>

{% if prediction %}

<h3>Prediction: {{ prediction }}</h3>
<h3>Risk Probability: {{ probability }}%</h3>

{% endif %}

</body>
</html>
